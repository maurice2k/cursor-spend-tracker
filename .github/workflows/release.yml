name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get version from git tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update package.json version
        run: npm version --no-git-tag-version ${GITHUB_REF#refs/tags/}

      - name: Compile TypeScript
        run: npm run compile

      - name: Install @vscode/vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: vsce package --out cursor-spend-tracker-${{ steps.version.outputs.version }}.vsix

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'release'
        with:
          files: cursor-spend-tracker-${{ steps.version.outputs.version }}.vsix

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: cursor-spend-tracker-${{ steps.version.outputs.version }}.vsix
          retention-days: 30
